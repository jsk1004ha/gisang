paths:
  observation_csv: data/raw/asos/seoul_20240101_20250324.csv
  era5_csv: data/raw/era5/seoul_20240101_20250324.nc
  station_metadata_csv: data/raw/metadata/stations.csv
  output_training_table: data/processed/dataset_real_2024_2025_q1_richer_multitarget/training_table.csv
timezone:
  source: Asia/Seoul
targets:
  - temp
  - humidity
observation_columns:
  station_id: station_id
  datetime: datetime
  temp: temp
  humidity: humidity
  pressure: pressure
  wind_speed: wind_speed
  precipitation: precipitation
  quality_flag: quality_flag
era5:
  extraction_mode: bilinear
features:
  encoder_continuous:
    - obs_temp
    - obs_humidity
    - obs_pressure
    - obs_wind_speed
    - era5_t2m
    - era5_sp
    - era5_u10
    - era5_v10
    - era5_tp
    - hour_sin
    - hour_cos
    - doy_sin
    - doy_cos
  decoder_known:
    - hour_sin
    - hour_cos
    - doy_sin
    - doy_cos
  static_real:
    - lat
    - lon
    - elevation
window:
  encoder_length: 72
  prediction_length: 6
split:
  train_end: 2025-02-28T23:00:00Z
  val_end: 2025-03-15T23:00:00Z
  test_end: 2025-03-24T23:00:00Z
scaling:
  mode: global
  columns:
    - obs_temp
    - obs_humidity
    - obs_pressure
    - obs_wind_speed
    - era5_t2m
    - era5_sp
    - era5_u10
    - era5_v10
    - era5_tp
    - target_temp
    - target_humidity
