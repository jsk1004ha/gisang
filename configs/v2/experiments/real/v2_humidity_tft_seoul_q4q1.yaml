experiment:
  name: v2_humidity_tft_seoul_q4q1
  version: v2
  notes: "Local real-data bootstrap config for humidity TFT on Seoul 108, 2024-10-01 to 2025-03-24."
paths:
  observation_csv: data/raw/asos/seoul_20241001_20250324.csv
  era5_csv: data/raw/era5/seoul_20241001_20250324_station.csv
  station_metadata_csv: data/raw/metadata/stations.csv
  output_training_table: data/processed/v2_real_humidity_seoul_q4q1/training_table.csv
  output_data_quality: data/processed/v2_real_humidity_seoul_q4q1/data_quality.json
data:
  target_name: humidity
  timezone:
    source: Asia/Seoul
  observation_columns:
    station_id: station_id
    datetime: datetime
    temp: temp
    humidity: humidity
    pressure: pressure
    wind_speed: wind_speed
    precipitation: precipitation
    quality_flag: quality_flag
  era5:
    extraction_mode: bilinear
  cleaning:
    interpolate_limit_hours: 12
  features:
    encoder_continuous:
      - obs_temp
      - obs_humidity
      - obs_dew_point_c
      - obs_dew_point_depression
      - target_value
      - target_value_lag_1
      - target_value_lag_3
      - target_value_lag_6
      - target_value_lag_12
      - target_value_lag_24
      - target_value_lag_48
      - target_value_lag_72
      - target_value_same_hour_prev_day
      - target_value_diff_vs_prev_day
      - target_value_roll_mean_3
      - target_value_roll_std_3
      - target_value_roll_mean_6
      - target_value_roll_std_6
      - target_value_roll_mean_12
      - target_value_roll_std_12
      - target_value_roll_mean_24
      - target_value_roll_std_24
      - target_value_delta_1
      - target_value_delta_6
      - target_value_delta_24
      - obs_humidity_roll_mean_6
      - obs_humidity_roll_mean_24
      - obs_humidity_delta_1
      - obs_humidity_delta_6
      - obs_humidity_delta_24
      - obs_temp_delta_1
      - obs_temp_delta_6
      - humidity_temp_interaction
      - obs_pressure
      - obs_wind_speed
      - obs_precipitation
      - era5_t2m
      - era5_sp
      - era5_dew_point_c
      - era5_dew_point_depression
      - era5_u10
      - era5_v10
      - era5_tp
      - hour_sin
      - hour_cos
      - doy_sin
      - doy_cos
      - month_sin
      - month_cos
    decoder_known:
      - hour_sin
      - hour_cos
      - doy_sin
      - doy_cos
    static_real:
      - lat
      - lon
      - elevation
      - coastal_distance_km
    static_categoricals:
      - station_id
      - region_class
  feature_engineering:
    lag_features:
      target_value: [1, 3, 6, 12, 24, 48, 72, 168]
      obs_temp: [1, 3, 6, 24]
      obs_humidity: [1, 3, 6, 24]
      obs_pressure: [1, 6, 24]
      obs_wind_speed: [1, 6, 24]
      obs_dew_point_c: [1, 3, 6, 24]
      obs_dew_point_depression: [1, 3, 6, 24]
      era5_t2m: [1, 3, 6, 12, 24]
      era5_sp: [1, 6, 24]
    rolling_features:
      target_value: [3, 6, 12, 24]
      obs_humidity: [6, 24]
      obs_temp: [6, 24]
    delta_features:
      target_value: [1, 6, 24]
      obs_humidity: [1, 6, 24]
      obs_temp: [1, 6, 24]
  window:
    encoder_length: 72
    prediction_length: 24
  split:
    train_end: 2024-12-31T23:00:00Z
    val_end: 2025-01-31T23:00:00Z
    test_end: 2025-02-28T23:00:00Z
  scaling:
    mode: global
    group_column: station_id
    columns:
      - obs_temp
      - obs_humidity
      - obs_dew_point_c
      - obs_dew_point_depression
      - target_value
      - target_value_lag_1
      - target_value_lag_3
      - target_value_lag_6
      - target_value_lag_12
      - target_value_lag_24
      - target_value_lag_48
      - target_value_lag_72
      - target_value_same_hour_prev_day
      - target_value_diff_vs_prev_day
      - target_value_roll_mean_3
      - target_value_roll_std_3
      - target_value_roll_mean_6
      - target_value_roll_std_6
      - target_value_roll_mean_12
      - target_value_roll_std_12
      - target_value_roll_mean_24
      - target_value_roll_std_24
      - target_value_delta_1
      - target_value_delta_6
      - target_value_delta_24
      - obs_humidity_roll_mean_6
      - obs_humidity_roll_mean_24
      - obs_humidity_delta_1
      - obs_humidity_delta_6
      - obs_humidity_delta_24
      - obs_temp_delta_1
      - obs_temp_delta_6
      - humidity_temp_interaction
      - obs_pressure
      - obs_wind_speed
      - obs_precipitation
      - era5_t2m
      - era5_sp
      - era5_dew_point_c
      - era5_dew_point_depression
      - era5_u10
      - era5_v10
      - era5_tp
      - month_sin
      - month_cos
      - lat
      - lon
      - elevation
      - coastal_distance_km
  postprocess:
    clip_prediction: [0, 100]
model:
  name: v2_humidity_tft
  type: tft
  backend: pytorch_forecasting
  allow_fallback_backend: false
  hidden_size: 32
  attention_head_size: 4
  hidden_continuous_size: 16
  dropout: 0.1
  learning_rate: 0.001
training:
  batch_size: 64
  max_epochs: 20
  early_stopping_patience: 5
  num_workers: 0
  device: cuda
  gradient_clip_val: 0.5
evaluation:
  bias_correction:
    enabled: true
    mode: per_horizon
artifacts:
  root_dir: data/artifacts/v2_experiments_real
  leaderboard_path: data/artifacts/v2_experiments_real/leaderboard.csv
